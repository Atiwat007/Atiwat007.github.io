<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ระบบประวัติการซ่อมเครื่องจักร</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1,h2{
  margin-top:0;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:12px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  background:#111;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.machine{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-top:6px;
}

.ok{
  background:#d4f7df;
  color:#067647;
}

.warn{
  background:#fff0c7;
  color:#9a6700;
}

.repair{
  border-top:1px solid #eee;
  padding-top:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="card">
    <h1>ระบบประวัติการซ่อมเครื่องจักร</h1>
  </div>

  <div class="card">
    <h2>บันทึกงานซ่อม</h2>

```
<label>เครื่องจักร</label>
<select id="machine"></select>

<label>วันที่</label>
<input type="date" id="date">

<label>ประเภทงาน</label>
<select id="type">
  <option>PM</option>
  <option>ซ่อมบำรุง</option>
  <option>ฉุกเฉิน</option>
</select>

<label>ชื่อช่าง</label>
<input type="text" id="tech">

<label>อาการ</label>
<textarea id="symptom"></textarea>

<label>วิธีแก้ไข</label>
<textarea id="fix"></textarea>

<label>อะไหล่</label>
<input type="text" id="parts">

<label>สถานะ</label>
<select id="status">
  <option value="done">เสร็จแล้ว</option>
  <option value="wait">รอดำเนินการ</option>
</select>

<button onclick="saveRepair()">
  บันทึกข้อมูล
</button>
```

  </div>

  <div class="card">
    <h2>รายการเครื่องจักร</h2>

```
<div id="machines"></div>
```

  </div>

</div>

<script>

// =========================
// SUPABASE
// =========================

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// =========================
// STATE
// =========================

let MACHINES = [];
let REPAIRS = [];

// =========================
// LOAD MACHINES
// =========================

async function loadMachines(){

  const { data, error } = await supabase
    .from("machines")
    .select("*")
    .order("id");

  if(error){
    console.error(error);
    alert("โหลด machines ไม่สำเร็จ");
    return;
  }

  MACHINES = data;

  renderMachines();
  renderMachineOptions();
}

// =========================
// LOAD REPAIRS
// =========================

async function loadRepairs(){

  const { data, error } = await supabase
    .from("repairs")
    .select("*")
    .order("repair_date", { ascending:false });

  if(error){
    console.error(error);
    alert("โหลด repairs ไม่สำเร็จ");
    return;
  }

  REPAIRS = data;

  renderMachines();
}

// =========================
// MACHINE SELECT
// =========================

function renderMachineOptions(){

  const select = document.getElementById("machine");

  select.innerHTML = MACHINES.map(m => `
    <option value="${m.id}">
      ${m.name}
    </option>
  `).join("");
}

// =========================
// MACHINE LIST
// =========================

function renderMachines(){

  const box = document.getElementById("machines");

  box.innerHTML = MACHINES.map(m => {

    const repairs = REPAIRS.filter(
      r => r.machine_id === m.id
    );

    return `
      <div class="machine">

        <h3>
          ${m.icon || "⚙️"} ${m.name}
        </h3>

        <div>
          ${m.description || ""}
        </div>

        <div style="margin-top:8px;">
          📍 ${m.location || "-"}
        </div>

        <div class="badge ok">
          PM ทุก ${m.pm_interval_days} วัน
        </div>

        <div style="margin-top:14px;">

          <strong>ประวัติการซ่อม</strong>

          ${
            repairs.length === 0
            ? "<p>ยังไม่มีข้อมูล</p>"
            : repairs.map(r => `
              <div class="repair">

                <div>
                  <strong>${r.repair_type}</strong>
                </div>

                <div>
                  📅 ${r.repair_date}
                </div>

                <div>
                  👨‍🔧 ${r.technician}
                </div>

                <div>
                  ⚠️ ${r.symptom || "-"}
                </div>

                <div>
                  🔧 ${r.fix || "-"}
                </div>

              </div>
            `).join("")
          }

        </div>

      </div>
    `;

  }).join("");
}

// =========================
// SAVE REPAIR
// =========================

async function saveRepair(){

  const machine_id =
    document.getElementById("machine").value;

  const repair_date =
    document.getElementById("date").value;

  const repair_type =
    document.getElementById("type").value;

  const technician =
    document.getElementById("tech").value;

  const symptom =
    document.getElementById("symptom").value;

  const fix =
    document.getElementById("fix").value;

  const parts =
    document.getElementById("parts").value;

  const status =
    document.getElementById("status").value;

  if(!technician || !symptom){

    alert("กรอกข้อมูลให้ครบ");

    return;
  }

  const { error } = await supabase
    .from("repairs")
    .insert([
      {
        machine_id,
        repair_date,
        repair_type,
        technician,
        symptom,
        fix,
        parts,
        status
      }
    ]);

  if(error){

    console.error(error);

    alert("บันทึกไม่สำเร็จ");

    return;
  }

  // update PM
  if(repair_type === "PM"){

    await supabase
      .from("machines")
      .update({
        pm_last_date: repair_date
      })
      .eq("id", machine_id);
  }

  alert("บันทึกสำเร็จ");

  document.getElementById("tech").value = "";
  document.getElementById("symptom").value = "";
  document.getElementById("fix").value = "";
  document.getElementById("parts").value = "";

  await loadRepairs();
}

// =========================
// INIT
// =========================

window.onload = async () => {

  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

  await loadMachines();

  await loadRepairs();
};

</script>

</body>
</html>
