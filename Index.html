<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประวัติการซ่อมเครื่องจักร (Supabase Cloud)</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --accent: #1a5fa8; --accent-bg: #e6f1fb;
    --success: #0f6e56; --success-bg: #e1f5ee;
    --warn: #854f0b; --warn-bg: #faeeda;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');

  .app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }
  .header { padding: 20px 0 16px; border-bottom: 0.5px solid var(--border); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .card + .card { margin-top: 10px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; }

  .machine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .machine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: border-color 0.15s; display: block; }
  .machine-card:hover { border-color: var(--border2); }
  .machine-card.pm-due { border-color: #e59a00; border-width: 1.5px; }
  .machine-card.pm-overdue { border-color: var(--danger); border-width: 1.5px; }
  .machine-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .machine-icon { font-size: 22px; }
  .machine-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .machine-desc { font-size: 12px; color: var(--text2); }
  .machine-date { font-size: 11px; color: var(--text3); margin-top: 8px; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-wait { background: var(--warn-bg); color: var(--warn); }
  .badge-fix { background: var(--danger-bg); color: var(--danger); }
  .badge-pm { background: var(--accent-bg); color: var(--accent); }
  .badge-due { background: #faeeda; color: #854f0b; }
  .badge-overdue { background: var(--danger-bg); color: var(--danger); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-family: inherit; padding: 8px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.1s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #333; }
  .btn-warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-control { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-control:focus { border-color: var(--accent); }
  textarea.form-control { min-height: 75px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .history-item { border-bottom: 0.5px solid var(--border); padding: 14px 0; }
  .history-item:last-child { border-bottom: none; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .history-title { font-size: 14px; font-weight: 600; }
  .history-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .history-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .parts-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 6px; margin: 6px 4px 0 0; }

  .qr-wrap { text-align: center; padding: 8px 0; }
  .qr-wrap canvas { border-radius: 8px; }
  .qr-label { font-size: 12px; color: var(--text3); margin-top: 8px; }

  .upload-area { border: 1px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; }
  .upload-area:hover { border-color: var(--accent); color: var(--accent); }
  .file-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .file-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text2); background: var(--surface2); padding: 4px 10px; border-radius: 6px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .spec-table { width: 100%; font-size: 13px; border-collapse: collapse; }
  .spec-table td { padding: 5px 0; vertical-align: top; }
  .spec-table td:first-child { color: var(--text3); width: 40%; }

  .back-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back-row h2 { font-size: 18px; font-weight: 600; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .pm-alert-banner { border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px; }
  .pm-alert-banner.overdue { background: var(--danger-bg); border: 0.5px solid #f09595; }
  .pm-alert-banner.due { background: var(--warn-bg); border: 0.5px solid #fac775; }
  .pm-alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .pm-alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .pm-alert-desc { font-size: 12px; color: var(--text2); }
  .pm-alert-banner.overdue .pm-alert-title { color: var(--danger); }
  .pm-alert-banner.due .pm-alert-title { color: var(--warn); }

  .pm-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pm-row:last-child { border-bottom: none; }
  .pm-row-label { font-size: 13px; color: var(--text2); }
  .pm-row-val { font-size: 13px; font-weight: 600; }

  .notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .notif-dot.red { background: var(--danger); }
  .notif-dot.orange { background: #e59a00; }
  .notif-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .notif-desc { font-size: 12px; color: var(--text2); }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app" id="app">กำลังโหลดข้อมูลจากฐานข้อมูล Cloud...</div>
<div class="toast" id="toast"></div>

<script>
// ==================== SUPABASE CONFIGURATION ====================
const SUPABASE_URL = "https://xypzufiofqpvsjinhldv.supabase.co"; // ⚠️ เปลี่ยนเป็น URL ของคุณ
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cHp1ZmlvZnFwdnNqaW5obGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDY1NzUsImV4cCI6MjA5NTUyMjU3NX0.DHu2lFQq37bgb6Mjb_TD2vibNaOdDNZNV2HsDRJhQJw"; // ⚠️ เปลี่ยนเป็น Public Anon Key ของคุณ
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==================== GLOBAL STATE ====================
let DB = { groups: [], machines: [], repairs: [] };
let currentView = "list"; 
let selectedMachine = null;
let activeTab = "history";
let pendingFiles = [];

// ==================== DATA LOADER FROM CLOUD (WITH AUTO-ALERT) ====================
async function loadData() {
  try {
    console.log("กำลังเริ่มเชื่อมต่อฐานข้อมูล Supabase...");
    
    // ดึงข้อมูลจาก 3 ตารางพร้อมกัน
    const [groupsRes, machinesRes, repairsRes] = await Promise.all([
      supabase.from('groups').select('*'),
      supabase.from('machines').select('*').order('id', { ascending: true }),
      supabase.from('repairs').select('*').order('date', { ascending: false })
    ]);

    // ตรวจสอบ Error ของแต่ละตารางอย่างละเอียด
    if (groupsRes.error) { 
      alert("❌ เกิดข้อผิดพลาดที่ตาราง [groups]:\n" + groupsRes.error.message + "\n\nคำแนะนำ: ตรวจสอบการสะกดชื่อตาราง หรือปิดการใช้งาน RLS"); 
      return; 
    }
    if (machinesRes.error) { 
      alert("❌ เกิดข้อผิดพลาดที่ตาราง [machines]:\n" + machinesRes.error.message + "\n\nคำแนะนำ: ตรวจสอบโครงสร้างคอลัมน์ หรือปิดการใช้งาน RLS"); 
      return; 
    }
    if (repairsRes.error) { 
      alert("❌ เกิดข้อผิดพลาดที่ตาราง [repairs]:\n" + repairsRes.error.message + "\n\nคำแนะนำ: ตรวจสอบโครงสร้างคอลัมน์ หรือปิดการใช้งาน RLS"); 
      return; 
    }

    // แปลงโครงสร้างข้อมูลเข้าสู่ตัวแปรของระบบหน้าบ้าน (Frontend)
    DB.groups = groupsRes.data;
    DB.machines = machinesRes.data.map(m => ({
      id: m.id, name: m.name, desc: m.desc_text, icon: m.icon, group: m.group_id,
      location: m.location, brand: m.brand, model: m.model, year: m.year, power: m.power, serial: m.serial,
      pm: { intervalDays: m.pm_interval_days, lastPmDate: m.pm_last_date, note: m.pm_note }
    }));
    DB.repairs = repairsRes.data.map(r => ({
      id: r.id, machineId: r.machine_id, date: r.date, type: r.type, tech: r.tech,
      symptom: r.symptom, fix: r.fix, parts: r.parts, status: r.status, files: r.files || []
    }));

    console.log("โหลดข้อมูลสำเร็จ! ระบบกำลังเรนเดอร์หน้าจอ...");
    updateUI(); 
  } catch (error) {
    console.error("Error fetching Supabase data:", error.message);
    alert("⚠️ ไม่สามารถเชื่อมต่อระบบ Cloud ได้:\n" + error.message + "\n\nคำแนะนำ: ตรวจสอบ URL และ Key ของ Supabase ในโค้ดบรรทัดที่ 103-104");
  }
}

// ==================== OPERATION FUNCTIONS ====================
async function savePmSettings(machineId) {
  const interval = parseInt(document.getElementById("pm-interval").value);
  const lastDate = document.getElementById("pm-last-date").value || null;
  const note = document.getElementById("pm-note").value;

  try {
    const { error } = await supabase
      .from('machines')
      .update({ pm_interval_days: interval, pm_last_date: lastDate, pm_note: note })
      .eq('id', machineId);

    if (error) throw error;

    showToast("💾 บันทึกการตั้งค่า PM สำเร็จ");
    await loadData();
    navigate('notifications', null);
  } catch (error) {
    alert("เกิดข้อผิดพลาดในการบันทึก PM: " + error.message);
  }
}

async function submitRepairForm() {
  const machineId = document.getElementById("f-machine").value;
  const date = document.getElementById("f-date").value;
  const type = document.getElementById("f-type").value;
  const tech = document.getElementById("f-tech").value;
  const symptom = document.getElementById("f-symptom").value;
  const fix = document.getElementById("f-fix").value;
  const parts = document.getElementById("f-parts").value;
  const status = document.getElementById("f-status").value;
  const updatePmCheckbox = document.getElementById("f-update-pm");

  if (!tech.trim() || !symptom.trim()) {
    showToast("❌ กรุณากรอกช่องข้อมูลที่จำเป็น (*) ให้ครบถ้วน");
    return;
  }

  try {
    const { error: repairError } = await supabase
      .from('repairs')
      .insert([{ machine_id: machineId, date, type, tech, symptom, fix, parts, status, files: [] }]);

    if (repairError) throw repairError;

    if (type === "PM" && updatePmCheckbox && updatePmCheckbox.checked) {
      await supabase
        .from('machines')
        .update({ pm_last_date: date })
        .eq('id', machineId);
    }

    showToast("✅ บันทึกประวัติการทำงานสำเร็จ");
    await loadData();
    navigate('machine', machineId);
  } catch (error) {
    alert("บันทึกประวัติล้มเหลว: " + error.message);
  }
}

function handleFiles(input) {
  pendingFiles = Array.from(input.files);
  const list = document.getElementById("file-list");
  list.innerHTML = pendingFiles.map(f => `<div class="file-item"><span>📄 ${f.name}</span></div>`).join("");
}

function togglePmUpdate(type) {
  const row = document.getElementById("pm-update-row");
  if(row) row.style.display = (type === "PM") ? "block" : "none";
}

// ==================== PM UTILS ====================
function getPmStatus(m) {
  if (!m.pm || !m.pm.lastPmDate) return null;
  const last = new Date(m.pm.lastPmDate);
  const next = new Date(last);
  next.setDate(next.getDate() + m.pm.intervalDays);
  const today = new Date();
  today.setHours(0,0,0,0);
  const daysLeft = Math.ceil((next - today) / (1000*60*60*24));
  return { nextDate: next, daysLeft, overdue: daysLeft < 0, dueSoon: daysLeft >= 0 && daysLeft <= 7 };
}

function pmStatusBadge(m) {
  const s = getPmStatus(m);
  if (!s) return "";
  if (s.overdue) return `<span class="badge badge-overdue">PM เกินกำหนด ${Math.abs(s.daysLeft)} วัน</span>`;
  if (s.dueSoon) return `<span class="badge badge-due">PM อีก ${s.daysLeft} วัน</span>`;
  return `<span class="badge badge-ok">PM อีก ${s.daysLeft} วัน</span>`;
}

function getAllAlerts() {
  const alerts = [];
  DB.machines.forEach(m => {
    const s = getPmStatus(m);
    if (!s) return;
    if (s.overdue || s.dueSoon) alerts.push({ machine: m, status: s });
  });
  alerts.sort((a,b) => a.status.daysLeft - b.status.daysLeft);
  return alerts;
}

// ==================== GENERAL UTILS ====================
function formatDate(d) {
  if (!d) return "-";
  const dt = new Date(d);
  return dt.toLocaleDateString("th-TH", { year: "numeric", month: "short", day: "numeric" });
}

function statusBadge(s) {
  const map = {
    ok: ["badge-ok","ปกติ"], wait: ["badge-wait","รอดำเนินการ"],
    fix: ["badge-fix","กำลังซ่อม"], done: ["badge-ok","เสร็จแล้ว"], PM: ["badge-pm","PM"]
  };
  const [cls, label] = map[s] || ["badge-pm", s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function machineStatus(m) {
  const repairs = DB.repairs.filter(r => r.machineId === m.id);
  return repairs.some(r => r.status === "wait") ? "wait" : "ok";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function copyLink(url) {
  navigator.clipboard.writeText(url);
  showToast("🔗 คัดลอกลิงก์เรียบร้อยแล้ว");
}

function downloadQR(id) {
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = `QR-${id}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

// ==================== VIEWS RENDERING ====================
function renderList() {
  const total = DB.machines.length;
  const currentYearMonth = new Date().toISOString().substring(0,7); 
  const thisMonth = DB.repairs.filter(r => r.date && r.date.startsWith(currentYearMonth)).length;
  const pendingRepair = DB.repairs.filter(r => r.status === "wait").length;
  const alerts = getAllAlerts();
  const alertCount = alerts.length;

  return `
    <div class="header">
      <div>
        <div class="header-title">ระบบจัดการ</div>
        <h1>ประวัติการซ่อมเครื่องจักร</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-sm" onclick="navigate('notifications',null)" style="position:relative;">
          🔔 แจ้งเตือน
          ${alertCount > 0 ? `<span style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${alertCount}</span>` : ""}
        </button>
        <button class="btn btn-primary btn-sm" onclick="navigate('add',null)">+ บันทึกการซ่อม</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">เครื่องจักร</div>
        <div class="stat-val">${total}</div>
      </div>
      <div class="stat">
        <div class="stat-label">ซ่อมเดือนนี้</div>
        <div class="stat-val">${thisMonth}</div>
      </div>
      <div class="stat">
        <div class="stat-label" style="color:var(--warn)">รอดำเนินการ</div>
        <div class="stat-val" style="color:var(--warn)">${pendingRepair}</div>
      </div>
      <div class="stat" style="cursor:pointer;" onclick="navigate('notifications',null)">
        <div class="stat-label" style="color:${alertCount>0?'var(--danger)':'var(--text3)'}">แจ้งเตือน PM</div>
        <div class="stat-val" style="color:${alertCount>0?'var(--danger)':'var(--text)'}">${alertCount}</div>
      </div>
    </div>

    ${alertCount > 0 ? `
      <div style="margin-bottom:20px;">
        ${alerts.slice(0,3).map(a => `
          <div class="pm-alert-banner ${a.status.overdue?'overdue':'due'}" style="cursor:pointer;" onclick="navigate('machine','${a.machine.id}')">
            <div class="pm-alert-icon">${a.status.overdue ? '🚨' : '⚠️'}</div>
            <div>
              <div class="pm-alert-title">${a.status.overdue ? `PM เกินกำหนด ${Math.abs(a.status.daysLeft)} วัน` : `PM ครบกำหนดใน ${a.status.daysLeft} วัน`}</div>
              <div class="pm-alert-desc">${a.machine.name} · ${a.machine.desc} · กำหนด ${formatDate(a.status.nextDate)}</div>
            </div>
          </div>
        `).join("")}
        ${alertCount > 3 ? `<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:6px;">และอีก ${alertCount-3} รายการ — <span style="color:var(--accent);cursor:pointer;" onclick="navigate('notifications',null)">ดูทั้งหมด</span></p>` : ""}
      </div>
    ` : ""}

    ${DB.groups.map(g => {
      const gMachines = DB.machines.filter(m => m.group === g.id);
      return `<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div class="section-label" style="margin-bottom:0;">${g.name}</div>
          <div style="flex:1;height:0.5px;background:var(--border);"></div>
          <span style="font-size:11px;color:var(--text3);">${gMachines.length} เครื่อง</span>
        </div>
        <div class="machine-grid">
          ${gMachines.map(m => {
            const st = machineStatus(m);
            const ps = getPmStatus(m);
            const cardClass = ps ? (ps.overdue ? "pm-overdue" : ps.dueSoon ? "pm-due" : "") : "";
            return `<div class="machine-card ${cardClass}" onclick="navigate('machine','${m.id}')">
              <div class="machine-card-top"><span class="machine-icon">${m.icon}</span>${statusBadge(st)}</div>
              <div class="machine-name">${m.name}</div>
              <div class="machine-desc">${m.desc}</div>
              ${ps ? `<div style="margin-top:6px;">${pmStatusBadge(m)}</div>` : ""}
              <div class="machine-date">📍 ${m.location}</div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  `;
}

function renderNotifications() {
  const alerts = getAllAlerts();
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('list',null)">← กลับ</button>
      <h2>การแจ้งเตือน PM</h2>
    </div>

    ${alerts.length === 0 ? `
      <div class="card" style="text-align:center;padding:40px;">
        <div style="font-size:36px;margin-bottom:12px;">✅</div>
        <p style="font-weight:600;margin-bottom:4px;">เครื่องจักรทุกตัวอยู่ในเกณฑ์ปกติ</p>
        <p style="font-size:13px;color:var(--text3);">ไม่มีเครื่องที่ต้องทำ PM ในขณะนี้</p>
      </div>
    ` : `
      <div class="card">
        ${alerts.map(a => `
          <div class="notif-item">
            <div class="notif-dot ${a.status.overdue?'red':'orange'}"></div>
            <div style="flex:1;">
              <div class="notif-title">${a.machine.name}</div>
              <div class="notif-desc">
                ${a.status.overdue
                  ? `<span style="color:var(--danger);font-weight:600;">เกินกำหนด ${Math.abs(a.status.daysLeft)} วัน</span>`
                  : `<span style="color:var(--warn);font-weight:600;">ครบกำหนดใน ${a.status.daysLeft} วัน</span>`}
                · กำหนด PM: ${formatDate(a.status.nextDate)}<br>
                ทำ PM ล่าสุด: ${formatDate(a.machine.pm.lastPmDate)} · รอบ: ทุก ${a.machine.pm.intervalDays} วัน
              </div>
              <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-primary" onclick="navigate('add','${a.machine.id}')">+ บันทึก PM</button>
                <button class="btn btn-sm" onclick="navigate('machine','${a.machine.id}')">ดูเครื่อง</button>
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    `}

    <div style="margin-top:16px;">
      <p class="section-label">เครื่องจักรทั้งหมด</p>
      <div class="card">
        ${DB.machines.map(m => {
          return `<div class="pm-row">
            <div>
              <div style="font-size:13px;font-weight:600;">${m.name}</div>
              <div style="font-size:11px;color:var(--text3);">รอบ: ทุก ${m.pm.intervalDays} วัน · ทำล่าสุด: ${formatDate(m.pm.lastPmDate)}</div>
            </div>
            <div style="text-align:right;">
              ${pmStatusBadge(m)}
              <button class="btn btn-sm" style="margin-top:4px;" onclick="navigate('pm-settings','${m.id}')">⚙ ตั้งค่า</button>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

function renderPmSettings(machineId) {
  const m = DB.machines.find(x => x.id === machineId);
  if (!m) return "";
  const ps = getPmStatus(m);
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('notifications',null)">← กลับ</button>
      <h2>ตั้งค่า PM – ${m.name}</h2>
    </div>

    ${ps ? `<div class="pm-alert-banner ${ps.overdue?'overdue':'due'}" style="margin-bottom:16px;">
      <div class="pm-alert-icon">${ps.overdue?'🚨':'⚠️'}</div>
      <div>
        <div class="pm-alert-title">${ps.overdue ? `เกินกำหนด ${Math.abs(ps.daysLeft)} วัน` : `ครบกำหนดใน ${ps.daysLeft} วัน`}</div>
        <div class="pm-alert-desc">กำหนด PM: ${formatDate(ps.nextDate)}</div>
      </div>
    </div>` : ""}

    <div class="card">
      <div class="form-group">
        <label class="form-label">รอบการทำ PM (วัน)</label>
        <select class="form-control" id="pm-interval">
          ${[7,14,30,60,90,180,365].map(d =>
            `<option value="${d}" ${m.pm.intervalDays===d?'selected':''}>${d} วัน ${d===30?'(1 เดือน)':d===90?'(3 เดือน)':d===180?'(6 เดือน)':d===365?'(1 ปี)':''}</option>`
          ).join("")}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">วันที่ทำ PM ล่าสุด</label>
        <input type="date" class="form-control" id="pm-last-date" value="${m.pm.lastPmDate || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">รายการงาน PM (checklist)</label>
        <textarea class="form-control" id="pm-note" placeholder="รายการงานที่ต้องทำเมื่อถึง PM...">${m.pm.note || ''}</textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="savePmSettings('${machineId}')">
        ✓ บันทึกการตั้งค่า PM
      </button>
    </div>
  `;
}

function renderMachine(machineId) {
  const m = DB.machines.find(x => x.id === machineId);
  if (!m) return "<p>ไม่พบเครื่องจักร</p>";
  const repairs = DB.repairs.filter(r => r.machineId === machineId);
  const st = machineStatus(m);
  const ps = getPmStatus(m);
  const pageUrl = `${location.origin}${location.pathname}?m=${machineId}`;

  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('list',null)">← กลับ</button>
      <h2>${m.name}</h2>
      ${statusBadge(st)}
    </div>

    ${ps && (ps.overdue || ps.dueSoon) ? `
      <div class="pm-alert-banner ${ps.overdue?'overdue':'due'}" style="margin-bottom:16px;cursor:pointer;" onclick="navigate('pm-settings','${m.id}')">
        <div class="pm-alert-icon">${ps.overdue?'🚨':'⚠️'}</div>
        <div style="flex:1;">
          <div class="pm-alert-title">${ps.overdue ? `PM เกินกำหนด ${Math.abs(ps.daysLeft)} วัน` : `PM ครบกำหนดใน ${ps.daysLeft} วัน`}</div>
          <div class="pm-alert-desc">กำหนด: ${formatDate(ps.nextDate)} · รอบทุก ${m.pm.intervalDays} วัน</div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();navigate('add','${m.id}')">+ บันทึก PM</button>
      </div>
    ` : ""}

    <div class="tabs">
      <div class="tab ${activeTab==='history'?'active':''}" onclick="setTab('history')">ประวัติการซ่อม</div>
      <div class="tab ${activeTab==='pm'?'active':''}" onclick="setTab('pm')">แผน PM</div>
      <div class="tab ${activeTab==='spec'?'active':''}" onclick="setTab('spec')">ข้อมูลเครื่อง</div>
      <div class="tab ${activeTab==='qr'?'active':''}" onclick="setTab('qr')">QR Code</div>
    </div>

    ${activeTab === 'history' ? `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-primary btn-sm" onclick="navigate('add','${machineId}')">+ บันทึกการซ่อมใหม่</button>
      </div>
      <div class="card">
        ${repairs.length === 0
          ? `<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0;">ยังไม่มีประวัติการซ่อม</p>`
          : repairs.map(r => `
            <div class="history-item">
              <div class="history-top">
                <div class="history-title">${r.symptom.substring(0,40)}${r.symptom.length>40?'...':''}</div>
                ${statusBadge(r.status==="done"?"done":r.type==="PM"?"PM":"wait")}
              </div>
              <div class="history-meta">${formatDate(r.date)} · ${r.tech} · ${r.type}</div>
              <div class="history-desc">
                <strong style="color:var(--text);font-size:12px;">อาการ:</strong> ${r.symptom}<br>
                <strong style="color:var(--text);font-size:12px;">การแก้ไข:</strong> ${r.fix || '-'}
              </div>
              ${r.parts ? `<span class="parts-tag">🔩 ${r.parts}</span>` : ""}
            </div>
          `).join("")
        }
      </div>
    ` : ""}

    ${activeTab === 'pm' ? `
      <div class="card" style="margin-bottom:12px;">
        <div class="pm-row">
          <span class="pm-row-label">รอบการทำ PM</span>
          <span class="pm-row-val">ทุก ${m.pm.intervalDays} วัน</span>
        </div>
        <div class="pm-row">
          <span class="pm-row-label">ทำ PM ล่าสุด</span>
          <span class="pm-row-val">${formatDate(m.pm.lastPmDate)}</span>
        </div>
        <div class="pm-row">
          <span class="pm-row-label">กำหนด PM ครั้งถัดไป</span>
          <span class="pm-row-val" style="color:${ps&&ps.overdue?'var(--danger)':ps&&ps.dueSoon?'var(--warn)':'var(--text)'}">
            ${ps ? formatDate(ps.nextDate) : "-"}
          </span>
        </div>
      </div>
      ${m.pm.note ? `
        <p class="section-label">รายการงาน PM</p>
        <div class="card">
          ${m.pm.note.split('\n').filter(l=>l.trim()).map(l=>`
            <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);">
              <input type="checkbox" style="margin-top:3px;flex-shrink:0;">
              <span style="font-size:13px;">${l}</span>
            </div>
          `).join("")}
        </div>
      ` : ""}
    ` : ""}

    ${activeTab === 'spec' ? `
      <div class="card">
        <table class="spec-table">
          <tr><td>ชื่อเครื่อง</td><td>${m.name} – ${m.desc}</td></tr>
          <tr><td>ยี่ห้อ / รุ่น</td><td>${m.brand} ${m.model}</td></tr>
          <tr><td>ปีที่ผลิต</td><td>${m.year}</td></tr>
          <tr><td>กำลังไฟฟ้า</td><td>${m.power}</td></tr>
          <tr><td>ตำแหน่งติดตั้ง</td><td>${m.location}</td></tr>
          <tr><td>Serial No.</td><td>${m.serial}</td></tr>
        </table>
      </div>
    ` : ""}

    ${activeTab === 'qr' ? `
      <div class="card" style="text-align:center;">
        <div class="qr-wrap">
          <canvas id="qr-canvas"></canvas>
          <div class="qr-label">${pageUrl}</div>
        </div>
        <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;">
          <button class="btn btn-sm" onclick="downloadQR('${m.id}')">⬇ ดาวน์โหลด QR</button>
          <button class="btn btn-sm" onclick="copyLink('${pageUrl}')">🔗 คัดลอกลิงก์</button>
        </div>
      </div>
    ` : ""}
  `;
}

function renderAdd(machineId) {
  const today = new Date().toISOString().split("T")[0];
  const opts = DB.machines.map(m => `<option value="${m.id}" ${m.id===machineId?'selected':''}>${m.name} – ${m.desc}</option>`).join("");
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate(${machineId?`'machine','${machineId}'`:"'list',null"})">← กลับ</button>
      <h2>บันทึกการซ่อม / PM</h2>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">เครื่องจักร *</label>
        <select class="form-control" id="f-machine">${opts}</select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">วันที่ *</label>
          <input type="date" class="form-control" id="f-date" value="${today}">
        </div>
        <div class="form-group">
          <label class="form-label">ประเภทงาน *</label>
          <select class="form-control" id="f-type" onchange="togglePmUpdate(this.value)">
            <option>ฉุกเฉิน</option>
            <option>ซ่อมบำรุง</option>
            <option>PM</option>
            <option>ปรับปรุง</option>
          </select>
        </div>
      </div>
      <div id="pm-update-row" style="display:none;" class="form-group">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="f-update-pm" checked>
          <span>อัปเดตวันทำ PM ล่าสุดของเครื่องนี้โดยอัตโนมัติ</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">ชื่อช่างผู้ดำเนินการ *</label>
        <input type="text" class="form-control" id="f-tech" placeholder="ชื่อ-นามสกุล">
      </div>
      <div class="form-group">
        <label class="form-label">อาการที่พบ / รายละเอียดงาน *</label>
        <textarea class="form-control" id="f-symptom" placeholder="อธิบายอาการ หรือรายละเอียดงานที่ทำ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">วิธีแก้ไข / การดำเนินการ</label>
        <textarea class="form-control" id="f-fix" placeholder="ขั้นตอนและวิธีการที่ดำเนินการ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">รายการอะไหล่ที่ใช้</label>
        <input type="text" class="form-control" id="f-parts" placeholder="เช่น V-belt A42 × 1">
      </div>
      <div class="form-group">
        <label class="form-label">สถานะ</label>
        <select class="form-control" id="f-status">
          <option value="done">เสร็จแล้ว</option>
          <option value="wait">รอดำเนินการ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">แนบรูปภาพ / เอกสาร</label>
        <div class="upload-area" onclick="document.getElementById('f-files').click()">
          📎 แตะเพื่อเลือกไฟล์ (รูปภาพ, PDF)
          <input type="file" id="f-files" multiple accept="image/*,.pdf" style="display:none" onchange="handleFiles(this)">
        </div>
        <div class="file-list" id="file-list"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;" onclick="submitRepairForm()">
        ✓ บันทึกข้อมูลลงระบบ
      </button>
    </div>
  `;
}

// ==================== APPLICATION LIFECYCLE ====================
function updateUI() {
  const app = document.getElementById("app");
  if (currentView === "list") app.innerHTML = renderList();
  else if (currentView === "machine") app.innerHTML = renderMachine(selectedMachine);
  else if (currentView === "add") app.innerHTML = renderAdd(selectedMachine);
  else if (currentView === "pm-settings") app.innerHTML = renderPmSettings(selectedMachine);
  else if (currentView === "notifications") app.innerHTML = renderNotifications();
  
  if (currentView === "machine" && activeTab === "qr") {
    const pageUrl = `${location.origin}${location.pathname}?m=${selectedMachine}`;
    QRCode.toCanvas(document.getElementById('qr-canvas'), pageUrl, { width: 180, margin: 2 });
  }
}

function navigate(view, machineId) {
  currentView = view;
  selectedMachine = machineId;
  if (view === 'machine') activeTab = 'history';
  updateUI();
}

function setTab(tab) {
  activeTab = tab;
  updateUI();
}

window.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const mId = urlParams.get('m');
  if (mId) {
    currentView = "machine";
    selectedMachine = mId;
  }
  loadData();
});
</script>
</body>
</html>
