<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประวัติการซ่อมเครื่องจักร</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
    --accent:#1a5fa8;--accent-bg:#e6f1fb;
    --success:#0f6e56;--success-bg:#e1f5ee;
    --warn:#854f0b;--warn-bg:#faeeda;
    --danger:#a32d2d;--danger-bg:#fcebeb;
    --radius:10px;--radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:680px;margin:0 auto;padding:0 16px 80px;}
  .header{padding:20px 0 16px;border-bottom:0.5px solid var(--border);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
  .header h1{font-size:20px;font-weight:600;}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
  .card+.card{margin-top:10px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;cursor:pointer;}
  .stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .stat-val{font-size:22px;font-weight:600;}
  .machine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .machine-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:border-color .15s;}
  .machine-card:hover{border-color:var(--border2);}
  .machine-card.pm-due{border-color:#e59a00;border-width:1.5px;}
  .machine-card.pm-overdue{border-color:var(--danger);border-width:1.5px;}
  .machine-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .machine-icon{font-size:22px;}
  .machine-name{font-size:14px;font-weight:600;margin-bottom:2px;}
  .machine-desc{font-size:12px;color:var(--text2);}
  .machine-date{font-size:11px;color:var(--text3);margin-top:8px;}
  .badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap;}
  .badge-ok{background:var(--success-bg);color:var(--success);}
  .badge-wait{background:var(--warn-bg);color:var(--warn);}
  .badge-pm{background:var(--accent-bg);color:var(--accent);}
  .badge-due{background:#faeeda;color:#854f0b;}
  .badge-overdue{background:var(--danger-bg);color:var(--danger);}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-family:inherit;padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:background .1s;}
  .btn:hover{background:var(--surface2);}
  .btn-primary{background:var(--text);color:#fff;border-color:transparent;}
  .btn-primary:hover{background:#333;}
  .btn-sm{font-size:12px;padding:5px 10px;}
  .section-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
  .form-control{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
  .form-control:focus{border-color:var(--accent);}
  textarea.form-control{min-height:75px;resize:vertical;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .history-item{border-bottom:0.5px solid var(--border);padding:14px 0;}
  .history-item:last-child{border-bottom:none;}
  .history-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .history-title{font-size:14px;font-weight:600;}
  .history-meta{font-size:12px;color:var(--text3);margin-bottom:6px;}
  .history-desc{font-size:13px;color:var(--text2);line-height:1.6;}
  .parts-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:6px;margin:6px 4px 0 0;}
  .qr-wrap{text-align:center;padding:8px 0;}
  .qr-wrap canvas{border-radius:8px;}
  .qr-label{font-size:12px;color:var(--text3);margin-top:8px;}
  .upload-area{border:1px dashed var(--border2);border-radius:var(--radius);padding:20px;text-align:center;color:var(--text3);font-size:13px;cursor:pointer;}
  .upload-area:hover{border-color:var(--accent);color:var(--accent);}
  .file-list{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
  .file-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:6px;}
  .tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:0.5px solid var(--border);}
  .tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .spec-table{width:100%;font-size:13px;border-collapse:collapse;}
  .spec-table td{padding:5px 0;vertical-align:top;}
  .spec-table td:first-child{color:var(--text3);width:40%;}
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back-row h2{font-size:18px;font-weight:600;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .pm-alert-banner{border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px;}
  .pm-alert-banner.overdue{background:var(--danger-bg);border:0.5px solid #f09595;}
  .pm-alert-banner.due{background:var(--warn-bg);border:0.5px solid #fac775;}
  .pm-alert-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
  .pm-alert-title{font-size:13px;font-weight:600;margin-bottom:2px;}
  .pm-alert-desc{font-size:12px;color:var(--text2);}
  .pm-alert-banner.overdue .pm-alert-title{color:var(--danger);}
  .pm-alert-banner.due .pm-alert-title{color:var(--warn);}
  .pm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);}
  .pm-row:last-child{border-bottom:none;}
  .pm-row-label{font-size:13px;color:var(--text2);}
  .pm-row-val{font-size:13px;font-weight:600;}
  .notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border);}
  .notif-item:last-child{border-bottom:none;}
  .notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .notif-dot.red{background:var(--danger);}
  .notif-dot.orange{background:#e59a00;}
  .notif-title{font-size:13px;font-weight:600;margin-bottom:2px;}
  .notif-desc{font-size:12px;color:var(--text2);}
  .loading{text-align:center;padding:60px 0;color:var(--text3);font-size:14px;}
  .loading-spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .config-box{background:var(--warn-bg);border:1px solid #fac775;border-radius:var(--radius-lg);padding:20px;margin:40px auto;max-width:480px;}
  .config-box h2{font-size:16px;margin-bottom:8px;color:var(--warn);}
  .config-box p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
  @media(max-width:480px){.form-row{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading"><div class="loading-spinner"></div>กำลังโหลด...</div></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  ⚙️  ตั้งค่า Supabase — แก้ไข 2 บรรทัดนี้เท่านั้น
//  1. เปิด Supabase Dashboard → Project Settings → API
//  2. คัดลอก "Project URL" และ "anon public" key มาใส่
// ============================================================
const SUPABASE_URL = 'https://xypzufiofqpvsjinhldv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cHp1ZmlvZnFwdnNqaW5obGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDY1NzUsImV4cCI6MjA5NTUyMjU3NX0.DHu2lFQq37bgb6Mjb_TD2vibNaOdDNZNV2HsDRJhQJw';
// ============================================================

// ==================== SUPABASE CLIENT ====================
const SB = {
  async get(table, query='') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async post(table, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async patch(table, id, body, idCol='id') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${idCol}=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }
};

// ==================== STATE ====================
let DB = { groups: [], machines: [], repairs: [] };
let currentView = 'list';
let selectedMachine = null;
let activeTab = 'history';
let pendingFiles = [];
let isLoading = false;

// ==================== PM UTILS ====================
function getPmStatus(m) {
  if (!m.pm_last_date || !m.pm_interval_days) return null;
  const next = new Date(m.pm_last_date);
  next.setDate(next.getDate() + m.pm_interval_days);
  const today = new Date(); today.setHours(0,0,0,0);
  const daysLeft = Math.ceil((next - today) / 86400000);
  return { nextDate: next, daysLeft, overdue: daysLeft < 0, dueSoon: daysLeft >= 0 && daysLeft <= 7 };
}
function pmStatusBadge(m) {
  const s = getPmStatus(m);
  if (!s) return '';
  if (s.overdue) return `<span class="badge badge-overdue">PM เกิน ${Math.abs(s.daysLeft)} วัน</span>`;
  if (s.dueSoon) return `<span class="badge badge-due">PM อีก ${s.daysLeft} วัน</span>`;
  return `<span class="badge badge-ok">PM อีก ${s.daysLeft} วัน</span>`;
}
function getAllAlerts() {
  return DB.machines
    .map(m => ({ machine: m, status: getPmStatus(m) }))
    .filter(a => a.status && (a.status.overdue || a.status.dueSoon))
    .sort((a,b) => a.status.daysLeft - b.status.daysLeft);
}

// ==================== UTILS ====================
function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' });
}
function statusBadge(s) {
  const map = { ok:['badge-ok','ปกติ'], wait:['badge-wait','รอดำเนินการ'], done:['badge-ok','เสร็จแล้ว'], PM:['badge-pm','PM'] };
  const [cls, label] = map[s] || ['badge-pm', s];
  return `<span class="badge ${cls}">${label}</span>`;
}
function machineHasPending(machineId) {
  return DB.repairs.some(r => r.machine_id === machineId && r.status === 'wait');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setLoading(msg='กำลังโหลด...') {
  document.getElementById('app').innerHTML = `<div class="loading"><div class="loading-spinner"></div>${msg}</div>`;
}
function isConfigured() {
  return SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co' && SUPABASE_KEY !== 'YOUR_ANON_KEY';
}

// ==================== DATA LOADING ====================
async function loadAll() {
  const [groups, machines, repairs] = await Promise.all([
    SB.get('machine_groups', 'order=created_at'),
    SB.get('machines', 'order=id'),
    SB.get('repairs', 'order=repair_date.desc')
  ]);
  DB.groups = groups;
  DB.machines = machines;
  DB.repairs = repairs;
}
async function loadRepairs(machineId) {
  DB.repairs = await SB.get('repairs', `machine_id=eq.${machineId}&order=repair_date.desc`);
}

// ==================== VIEWS ====================
function renderConfig() {
  return `<div class="config-box">
    <h2>⚙️ ยังไม่ได้ตั้งค่า Supabase</h2>
    <p>เปิดไฟล์ <strong>index.html</strong> แล้วแก้ไขบรรทัดด้านบนของ JavaScript:</p>
    <pre style="background:#fff;padding:10px;border-radius:8px;font-size:12px;overflow-x:auto;">const SUPABASE_URL = 'https://xxxx.supabase.co';
const SUPABASE_KEY = 'eyJhbGci...';</pre>
    <p style="margin-top:8px;">หาได้ที่ Supabase Dashboard → Project Settings → API</p>
  </div>`;
}

function renderList() {
  const alerts = getAllAlerts();
  const alertCount = alerts.length;
  const thisMonth = DB.repairs.filter(r => r.repair_date && r.repair_date.startsWith(new Date().toISOString().slice(0,7))).length;
  const pending = DB.repairs.filter(r => r.status === 'wait').length;

  return `
    <div class="header">
      <div>
        <div class="header-title">ระบบจัดการ</div>
        <h1>ประวัติการซ่อมเครื่องจักร</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-sm" onclick="navigate('notifications',null)" style="position:relative;">
          🔔 แจ้งเตือน
          ${alertCount > 0 ? `<span style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${alertCount}</span>` : ''}
        </button>
        <button class="btn btn-primary btn-sm" onclick="navigate('add',null)">+ บันทึกการซ่อม</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">เครื่องจักร</div><div class="stat-val">${DB.machines.length}</div></div>
      <div class="stat"><div class="stat-label">ซ่อมเดือนนี้</div><div class="stat-val">${thisMonth}</div></div>
      <div class="stat"><div class="stat-label" style="color:var(--warn)">รอดำเนินการ</div><div class="stat-val" style="color:var(--warn)">${pending}</div></div>
      <div class="stat" onclick="navigate('notifications',null)">
        <div class="stat-label" style="color:${alertCount>0?'var(--danger)':'var(--text3)'}">แจ้งเตือน PM</div>
        <div class="stat-val" style="color:${alertCount>0?'var(--danger)':'var(--text)'}">${alertCount}</div>
      </div>
    </div>

    ${alertCount > 0 ? alerts.slice(0,3).map(a => `
      <div class="pm-alert-banner ${a.status.overdue?'overdue':'due'}" style="cursor:pointer;" onclick="navigate('machine','${a.machine.id}')">
        <div class="pm-alert-icon">${a.status.overdue?'🚨':'⚠️'}</div>
        <div>
          <div class="pm-alert-title">${a.status.overdue?`PM เกินกำหนด ${Math.abs(a.status.daysLeft)} วัน`:`PM ครบกำหนดใน ${a.status.daysLeft} วัน`}</div>
          <div class="pm-alert-desc">${a.machine.name} · กำหนด ${formatDate(a.status.nextDate)}</div>
        </div>
      </div>
    `).join('') : ''}

    ${DB.groups.map(g => {
      const gm = DB.machines.filter(m => m.group_id === g.id);
      return `<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div class="section-label" style="margin-bottom:0;">${g.name}</div>
          <div style="flex:1;height:0.5px;background:var(--border);"></div>
          <span style="font-size:11px;color:var(--text3);">${gm.length} เครื่อง</span>
        </div>
        <div class="machine-grid">
          ${gm.map(m => {
            const ps = getPmStatus(m);
            const cardCls = ps ? (ps.overdue?'pm-overdue':ps.dueSoon?'pm-due':'') : '';
            const hasPending = machineHasPending(m.id);
            return `<div class="machine-card ${cardCls}" onclick="navigate('machine','${m.id}')">
              <div class="machine-card-top"><span class="machine-icon">${m.icon||'⚙️'}</span>${statusBadge(hasPending?'wait':'ok')}</div>
              <div class="machine-name">${m.name}</div>
              <div class="machine-desc">${m.description||''}</div>
              ${ps ? `<div style="margin-top:6px;">${pmStatusBadge(m)}</div>` : ''}
              <div class="machine-date">📍 ${m.location||''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderMachine(machineId) {
  const m = DB.machines.find(x => x.id === machineId);
  if (!m) return '<p>ไม่พบเครื่องจักร</p>';
  const repairs = DB.repairs.filter(r => r.machine_id === machineId);
  const ps = getPmStatus(m);
  const pageUrl = `${location.origin}${location.pathname}?m=${machineId}`;

  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('list',null)">← กลับ</button>
      <h2>${m.name}</h2>
      ${statusBadge(machineHasPending(machineId)?'wait':'ok')}
    </div>

    ${ps && (ps.overdue||ps.dueSoon) ? `
      <div class="pm-alert-banner ${ps.overdue?'overdue':'due'}" style="margin-bottom:16px;">
        <div class="pm-alert-icon">${ps.overdue?'🚨':'⚠️'}</div>
        <div style="flex:1;">
          <div class="pm-alert-title">${ps.overdue?`PM เกินกำหนด ${Math.abs(ps.daysLeft)} วัน`:`PM ครบกำหนดใน ${ps.daysLeft} วัน`}</div>
          <div class="pm-alert-desc">กำหนด: ${formatDate(ps.nextDate)} · รอบทุก ${m.pm_interval_days} วัน</div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="navigate('add','${m.id}')">+ บันทึก PM</button>
      </div>
    ` : ''}

    <div class="tabs">
      <div class="tab ${activeTab==='history'?'active':''}" onclick="setTab('history')">ประวัติการซ่อม</div>
      <div class="tab ${activeTab==='pm'?'active':''}" onclick="setTab('pm')">แผน PM${ps&&(ps.overdue||ps.dueSoon)?` <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${ps.overdue?'var(--danger)':'#e59a00'};margin-left:4px;vertical-align:middle;"></span>`:''}</div>
      <div class="tab ${activeTab==='spec'?'active':''}" onclick="setTab('spec')">ข้อมูลเครื่อง</div>
      <div class="tab ${activeTab==='qr'?'active':''}" onclick="setTab('qr')">QR Code</div>
    </div>

    ${activeTab==='history' ? `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-primary btn-sm" onclick="navigate('add','${machineId}')">+ บันทึกการซ่อมใหม่</button>
      </div>
      <div class="card">
        ${repairs.length===0 ? `<p style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0;">ยังไม่มีประวัติการซ่อม</p>` :
          repairs.map(r => `
            <div class="history-item">
              <div class="history-top">
                <div class="history-title">${r.symptom.substring(0,40)}${r.symptom.length>40?'...':''}</div>
                ${statusBadge(r.status==='done'?'done':r.type==='PM'?'PM':'wait')}
              </div>
              <div class="history-meta">${formatDate(r.repair_date)} · ${r.technician} · ${r.type}</div>
              <div class="history-desc">
                <strong style="color:var(--text);font-size:12px;">อาการ:</strong> ${r.symptom}<br>
                <strong style="color:var(--text);font-size:12px;">การแก้ไข:</strong> ${r.fix_action||'-'}
              </div>
              ${r.parts_used ? `<span class="parts-tag">🔩 ${r.parts_used}</span>` : ''}
              ${r.file_names?.length ? `<span class="parts-tag">📎 ${r.file_names.length} ไฟล์</span>` : ''}
            </div>
          `).join('')
        }
      </div>
    ` : ''}

    ${activeTab==='pm' ? `
      <div class="card" style="margin-bottom:12px;">
        <div class="pm-row"><span class="pm-row-label">รอบการทำ PM</span><span class="pm-row-val">ทุก ${m.pm_interval_days} วัน</span></div>
        <div class="pm-row"><span class="pm-row-label">ทำ PM ล่าสุด</span><span class="pm-row-val">${formatDate(m.pm_last_date)}</span></div>
        <div class="pm-row"><span class="pm-row-label">กำหนดครั้งถัดไป</span><span class="pm-row-val" style="color:${ps&&ps.overdue?'var(--danger)':ps&&ps.dueSoon?'var(--warn)':'var(--text)'}">${ps?formatDate(ps.nextDate):'-'}</span></div>
        <div class="pm-row" style="border-bottom:none;"><span class="pm-row-label">สถานะ</span><span>${pmStatusBadge(m)}</span></div>
      </div>
      ${m.pm_note ? `
        <p class="section-label">รายการงาน PM</p>
        <div class="card">
          ${m.pm_note.split('\n').filter(l=>l.trim()).map(l=>`
            <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);">
              <input type="checkbox" style="margin-top:3px;flex-shrink:0;">
              <span style="font-size:13px;">${l}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="navigate('add','${machineId}')">+ บันทึก PM ที่ทำแล้ว</button>
        <button class="btn btn-sm" onclick="navigate('pm-settings','${machineId}')">⚙ ตั้งค่า PM</button>
      </div>
    ` : ''}

    ${activeTab==='spec' ? `
      <div class="card">
        <table class="spec-table">
          <tr><td>ชื่อเครื่อง</td><td>${m.name} – ${m.description||''}</td></tr>
          <tr><td>ยี่ห้อ / รุ่น</td><td>${m.brand||'-'} ${m.model||''}</td></tr>
          <tr><td>ปีที่ผลิต</td><td>${m.manufacture_year||'-'}</td></tr>
          <tr><td>กำลังไฟฟ้า</td><td>${m.power||'-'}</td></tr>
          <tr><td>ตำแหน่งติดตั้ง</td><td>${m.location||'-'}</td></tr>
          <tr><td>Serial No.</td><td>${m.serial_number||'-'}</td></tr>
        </table>
      </div>
    ` : ''}

    ${activeTab==='qr' ? `
      <div class="card" style="text-align:center;">
        <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">สแกน QR Code นี้เพื่อเปิดหน้า <strong>${m.name}</strong></p>
        <div class="qr-wrap"><canvas id="qr-canvas"></canvas><div class="qr-label">${pageUrl}</div></div>
        <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-sm" onclick="downloadQR('${m.id}')">⬇ ดาวน์โหลด QR</button>
          <button class="btn btn-sm" onclick="copyLink('${pageUrl}')">🔗 คัดลอกลิงก์</button>
        </div>
      </div>
    ` : ''}
  `;
}

function renderNotifications() {
  const alerts = getAllAlerts();
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('list',null)">← กลับ</button>
      <h2>การแจ้งเตือน PM</h2>
    </div>
    ${alerts.length===0 ? `
      <div class="card" style="text-align:center;padding:40px;">
        <div style="font-size:36px;margin-bottom:12px;">✅</div>
        <p style="font-weight:600;margin-bottom:4px;">ทุกเครื่องอยู่ในเกณฑ์ปกติ</p>
        <p style="font-size:13px;color:var(--text3);">ไม่มีเครื่องที่ต้องทำ PM ในขณะนี้</p>
      </div>
    ` : `
      <div class="card">
        ${alerts.map(a => `
          <div class="notif-item">
            <div class="notif-dot ${a.status.overdue?'red':'orange'}"></div>
            <div style="flex:1;">
              <div class="notif-title">${a.machine.name}</div>
              <div class="notif-desc">
                ${a.status.overdue
                  ? `<span style="color:var(--danger);font-weight:600;">เกินกำหนด ${Math.abs(a.status.daysLeft)} วัน</span>`
                  : `<span style="color:var(--warn);font-weight:600;">ครบกำหนดใน ${a.status.daysLeft} วัน</span>`}
                · กำหนด PM: ${formatDate(a.status.nextDate)}<br>
                ทำล่าสุด: ${formatDate(a.machine.pm_last_date)} · รอบ: ทุก ${a.machine.pm_interval_days} วัน
              </div>
              <div style="margin-top:8px;display:flex;gap:6px;">
                <button class="btn btn-sm btn-primary" onclick="navigate('add','${a.machine.id}')">+ บันทึก PM</button>
                <button class="btn btn-sm" onclick="navigate('machine','${a.machine.id}')">ดูเครื่อง</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `}
    <div style="margin-top:16px;">
      <p class="section-label">ตั้งค่า PM ทุกเครื่อง</p>
      <div class="card">
        ${DB.machines.map(m => `
          <div class="pm-row">
            <div>
              <div style="font-size:13px;font-weight:600;">${m.name}</div>
              <div style="font-size:11px;color:var(--text3);">ทุก ${m.pm_interval_days} วัน · ล่าสุด: ${formatDate(m.pm_last_date)}</div>
            </div>
            <div style="text-align:right;">${pmStatusBadge(m)}<br>
              <button class="btn btn-sm" style="margin-top:4px;" onclick="navigate('pm-settings','${m.id}')">⚙ ตั้งค่า</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderPmSettings(machineId) {
  const m = DB.machines.find(x => x.id === machineId);
  if (!m) return '';
  const ps = getPmStatus(m);
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('notifications',null)">← กลับ</button>
      <h2>ตั้งค่า PM – ${m.name}</h2>
    </div>
    ${ps && (ps.overdue||ps.dueSoon) ? `
      <div class="pm-alert-banner ${ps.overdue?'overdue':'due'}" style="margin-bottom:16px;">
        <div class="pm-alert-icon">${ps.overdue?'🚨':'⚠️'}</div>
        <div><div class="pm-alert-title">${ps.overdue?`เกินกำหนด ${Math.abs(ps.daysLeft)} วัน`:`ครบกำหนดใน ${ps.daysLeft} วัน`}</div>
        <div class="pm-alert-desc">กำหนด PM: ${formatDate(ps.nextDate)}</div></div>
      </div>
    ` : ''}
    <div class="card">
      <div class="form-group">
        <label class="form-label">รอบการทำ PM (วัน)</label>
        <select class="form-control" id="pm-interval">
          ${[7,14,30,60,90,180,365].map(d =>
            `<option value="${d}" ${m.pm_interval_days===d?'selected':''}>${d} วัน${d===30?' (1 เดือน)':d===90?' (3 เดือน)':d===180?' (6 เดือน)':d===365?' (1 ปี)':''}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">วันที่ทำ PM ล่าสุด</label>
        <input type="date" class="form-control" id="pm-last-date" value="${m.pm_last_date||''}">
      </div>
      <div class="form-group">
        <label class="form-label">รายการงาน PM (แต่ละบรรทัด = 1 รายการ)</label>
        <textarea class="form-control" id="pm-note" placeholder="ล้างตะแกรง&#10;ตรวจสายพาน&#10;เปลี่ยนน้ำมัน">${m.pm_note||''}</textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="savePmSettings('${machineId}')">
        ✓ บันทึกการตั้งค่า PM
      </button>
    </div>
  `;
}

function renderAdd(machineId) {
  const today = new Date().toISOString().split('T')[0];
  const opts = DB.machines.map(m => `<option value="${m.id}" ${m.id===machineId?'selected':''}>${m.name}</option>`).join('');
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate(${machineId?`'machine','${machineId}'`:"'list',null"})">← กลับ</button>
      <h2>บันทึกการซ่อม / PM</h2>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">เครื่องจักร *</label>
        <select class="form-control" id="f-machine">${opts}</select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">วันที่ *</label>
          <input type="date" class="form-control" id="f-date" value="${today}">
        </div>
        <div class="form-group">
          <label class="form-label">ประเภทงาน *</label>
          <select class="form-control" id="f-type" onchange="togglePmRow(this.value)">
            <option>ฉุกเฉิน</option><option>ซ่อมบำรุง</option><option>PM</option><option>ปรับปรุง</option>
          </select>
        </div>
      </div>
      <div id="pm-update-row" style="display:none;" class="form-group">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="f-update-pm" checked>
          <span>อัปเดตวันทำ PM ล่าสุดของเครื่องนี้โดยอัตโนมัติ</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">ชื่อช่างผู้ดำเนินการ *</label>
        <input type="text" class="form-control" id="f-tech" placeholder="ชื่อ-นามสกุล">
      </div>
      <div class="form-group">
        <label class="form-label">อาการที่พบ / รายละเอียดงาน *</label>
        <textarea class="form-control" id="f-symptom" placeholder="อธิบายอาการที่พบ หรือรายละเอียดงาน PM ที่ทำ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">วิธีแก้ไข / การดำเนินการ</label>
        <textarea class="form-control" id="f-fix" placeholder="ขั้นตอนและวิธีการที่ดำเนินการ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">รายการอะไหล่ที่ใช้</label>
        <input type="text" class="form-control" id="f-parts" placeholder="เช่น V-belt A42 × 1">
      </div>
      <div class="form-group">
        <label class="form-label">สถานะ</label>
        <select class="form-control" id="f-status">
          <option value="done">เสร็จแล้ว</option>
          <option value="wait">รอดำเนินการ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">แนบรูปภาพ / เอกสาร</label>
        <div class="upload-area" onclick="document.getElementById('f-files').click()">
          📎 แตะเพื่อเลือกไฟล์
          <input type="file" id="f-files" multiple accept="image/*,.pdf,.doc,.docx" style="display:none" onchange="handleFiles(this)">
        </div>
        <div class="file-list" id="file-list"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;" onclick="saveRepair()">
        ✓ บันทึกรายการ
      </button>
    </div>
  `;
}

// ==================== NAVIGATION ====================
async function navigate(view, machineId) {
  currentView = view; selectedMachine = machineId; activeTab = 'history'; pendingFiles = [];
  if (view === 'machine') {
    setLoading('กำลังโหลดข้อมูลเครื่อง...');
    try { await loadRepairs(machineId); } catch(e) {}
    const url = new URL(location.href);
    url.searchParams.set('m', machineId);
    history.pushState({}, '', url);
  } else {
    history.pushState({}, '', location.pathname);
  }
  render(); window.scrollTo(0,0);
}

function setTab(tab) {
  activeTab = tab; render();
  if (tab === 'qr') {
    setTimeout(() => {
      const canvas = document.getElementById('qr-canvas');
      if (canvas) QRCode.toCanvas(canvas, `${location.origin}${location.pathname}?m=${selectedMachine}`, { width: 200, margin: 2 }, ()=>{});
    }, 50);
  }
}

function render() {
  let html = '';
  if (!isConfigured()) html = renderConfig();
  else if (currentView === 'list') html = renderList();
  else if (currentView === 'machine') html = renderMachine(selectedMachine);
  else if (currentView === 'add') html = renderAdd(selectedMachine);
  else if (currentView === 'notifications') html = renderNotifications();
  else if (currentView === 'pm-settings') html = renderPmSettings(selectedMachine);
  document.getElementById('app').innerHTML = html;
}

// ==================== ACTIONS ====================
function togglePmRow(val) {
  const row = document.getElementById('pm-update-row');
  if (row) row.style.display = val === 'PM' ? 'block' : 'none';
}
function handleFiles(input) {
  pendingFiles = Array.from(input.files);
  document.getElementById('file-list').innerHTML = pendingFiles.map(f =>
    `<div class="file-item"><span>📄 ${f.name}</span><span style="color:var(--text3)">${(f.size/1024).toFixed(0)} KB</span></div>`
  ).join('');
}

async function saveRepair() {
  const machineId = document.getElementById('f-machine').value;
  const date      = document.getElementById('f-date').value;
  const type      = document.getElementById('f-type').value;
  const tech      = document.getElementById('f-tech').value.trim();
  const symptom   = document.getElementById('f-symptom').value.trim();
  const fix       = document.getElementById('f-fix').value.trim();
  const parts     = document.getElementById('f-parts').value.trim();
  const status    = document.getElementById('f-status').value;
  const updatePm  = type === 'PM' && document.getElementById('f-update-pm')?.checked;

  if (!tech || !symptom) { alert('กรุณากรอกชื่อช่างและรายละเอียดงาน'); return; }

  setLoading('กำลังบันทึก...');
  try {
    await SB.post('repairs', {
      machine_id: machineId, repair_date: date, type, technician: tech,
      symptom, fix_action: fix||'-', parts_used: parts||null,
      status, file_names: pendingFiles.map(f=>f.name)
    });
    if (updatePm) {
      await SB.patch('machines', machineId, { pm_last_date: date });
      const m = DB.machines.find(x => x.id === machineId);
      if (m) m.pm_last_date = date;
    }
    showToast('✓ บันทึกสำเร็จแล้ว!');
    await navigate('machine', machineId);
  } catch(e) {
    alert('เกิดข้อผิดพลาด: ' + e.message);
    render();
  }
}

async function savePmSettings(machineId) {
  const intervalDays = parseInt(document.getElementById('pm-interval').value);
  const lastDate     = document.getElementById('pm-last-date').value;
  const note         = document.getElementById('pm-note').value;
  setLoading('กำลังบันทึก...');
  try {
    await SB.patch('machines', machineId, { pm_interval_days: intervalDays, pm_last_date: lastDate||null, pm_note: note });
    const m = DB.machines.find(x => x.id === machineId);
    if (m) { m.pm_interval_days = intervalDays; m.pm_last_date = lastDate; m.pm_note = note; }
    showToast('✓ บันทึกการตั้งค่า PM แล้ว!');
    navigate('notifications', null);
  } catch(e) {
    alert('เกิดข้อผิดพลาด: ' + e.message);
    render();
  }
}

function downloadQR(machineId) {
  const canvas = document.getElementById('qr-canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = `QR-${machineId}.png`; a.href = canvas.toDataURL(); a.click();
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showToast('คัดลอกลิงก์แล้ว!'));
}

// ==================== INIT ====================
window.addEventListener('load', async () => {
  if (!isConfigured()) { render(); return; }
  setLoading('กำลังโหลดข้อมูล...');
  try {
    await loadAll();
    const params = new URLSearchParams(location.search);
    const m = params.get('m');
    if (m && DB.machines.find(x => x.id === m)) {
      currentView = 'machine'; selectedMachine = m;
      await loadRepairs(m);
    }
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="config-box">
        <h2>⚠️ เชื่อมต่อ Supabase ไม่สำเร็จ</h2>
        <p>กรุณาตรวจสอบ SUPABASE_URL และ SUPABASE_KEY ว่าถูกต้อง และตรวจสอบว่ารัน SQL setup แล้ว</p>
        <p style="margin-top:8px;font-size:12px;color:var(--danger);">${e.message}</p>
      </div>`;
  }
});
</script>
</body>
</html>
