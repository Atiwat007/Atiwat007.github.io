<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประวัติการซ่อมเครื่องจักร</title>
<script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js)"></script>
<script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --accent: #1a5fa8; --accent-bg: #e6f1fb;
    --success: #0f6e56; --success-bg: #e1f5ee;
    --warn: #854f0b; --warn-bg: #faeeda;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  @import url('[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap)');

  .app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }
  .header { padding: 20px 0 16px; border-bottom: 0.5px solid var(--border); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .card + .card { margin-top: 10px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; }

  .machine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .machine-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: border-color 0.15s; display: block; }
  .machine-card:hover { border-color: var(--border2); }
  .machine-card.pm-due { border-color: #e59a00; border-width: 1.5px; }
  .machine-card.pm-overdue { border-color: var(--danger); border-width: 1.5px; }
  .machine-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .machine-icon { font-size: 22px; }
  .machine-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .machine-desc { font-size: 12px; color: var(--text2); }
  .machine-date { font-size: 11px; color: var(--text3); margin-top: 8px; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-wait { background: var(--warn-bg); color: var(--warn); }
  .badge-fix { background: var(--danger-bg); color: var(--danger); }
  .badge-pm { background: var(--accent-bg); color: var(--accent); }
  .badge-due { background: #faeeda; color: #854f0b; }
  .badge-overdue { background: var(--danger-bg); color: var(--danger); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-family: inherit; padding: 8px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.1s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #333; }
  .btn-warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-control { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-control:focus { border-color: var(--accent); }
  textarea.form-control { min-height: 75px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .history-item { border-bottom: 0.5px solid var(--border); padding: 14px 0; }
  .history-item:last-child { border-bottom: none; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .history-title { font-size: 14px; font-weight: 600; }
  .history-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .history-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .parts-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 6px; margin: 6px 4px 0 0; }

  .qr-wrap { text-align: center; padding: 8px 0; }
  .qr-wrap canvas { border-radius: 8px; }
  .qr-label { font-size: 12px; color: var(--text3); margin-top: 8px; }

  .upload-area { border: 1px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; }
  .upload-area:hover { border-color: var(--accent); color: var(--accent); }
  .file-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .file-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text2); background: var(--surface2); padding: 4px 10px; border-radius: 6px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .spec-table { width: 100%; font-size: 13px; border-collapse: collapse; }
  .spec-table td { padding: 5px 0; vertical-align: top; }
  .spec-table td:first-child { color: var(--text3); width: 40%; }

  .back-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back-row h2 { font-size: 18px; font-weight: 600; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .loading { text-align: center; padding: 40px; color: var(--text3); }
  .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pm-alert-banner { border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px; }
  .pm-alert-banner.overdue { background: var(--danger-bg); border: 0.5px solid #f09595; }
  .pm-alert-banner.due { background: var(--warn-bg); border: 0.5px solid #fac775; }
  .pm-alert-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .pm-alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .pm-alert-desc { font-size: 12px; color: var(--text2); }
  .pm-alert-banner.overdue .pm-alert-title { color: var(--danger); }
  .pm-alert-banner.due .pm-alert-title { color: var(--warn); }

  .pm-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pm-row:last-child { border-bottom: none; }
  .pm-row-label { font-size: 13px; color: var(--text2); }
  .pm-row-val { font-size: 13px; font-weight: 600; }

  .notif-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .notif-dot.red { background: var(--danger); }
  .notif-dot.orange { background: #e59a00; }
  .notif-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .notif-desc { font-size: 12px; color: var(--text2); }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p style="margin-top:12px;">กำลังโหลดข้อมูล...</p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ==================== SUPABASE CONFIG ====================
// แทนที่ด้วย URL และ anon key ของคุณจาก Supabase Dashboard > Settings > API
const SUPABASE_URL = 'https://xypzufiofqpvsjinhldv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cHp1ZmlvZnFwdnNqaW5obGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NDY1NzUsImV4cCI6MjA5NTUyMjU3NX0.DHu2lFQq37bgb6Mjb_TD2vibNaOdDNZNV2HsDRJhQJw';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== DATA STORE ====================
const DB = {
  groups: [],
  machines: [],
  repairs: []
};

// ==================== STATE ====================
let currentView = "list";
let selectedMachine = null;
let activeTab = "history";
let pendingFiles = [];
let isLoading = false;

// ==================== DATABASE FUNCTIONS ====================

async function loadAllData() {
  isLoading = true;
  renderLoading();
  
  try {
    // โหลดกลุ่ม
    const { data: groups, error: groupsError } = await supabase
      .from('groups')
      .select('*')
      .order('name');
    
    if (groupsError) throw groupsError;
    DB.groups = groups.map(g => ({ id: g.id, name: g.name }));

    // โหลดเครื่องจักร
    const { data: machines, error: machinesError } = await supabase
      .from('machines')
      .select('*')
      .order('name');
    
    if (machinesError) throw machinesError;
    DB.machines = machines.map(m => ({
      id: m.id,
      name: m.name,
      desc: m.description || '',
      icon: m.icon || '🔵',
      group: m.group_id,
      location: m.location || '-',
      brand: m.brand || '-',
      model: m.model || '-',
      year: m.year || '-',
      power: m.power || '-',
      serial: m.serial || '-',
      pm: {
        intervalDays: m.pm_interval_days || 30,
        lastPmDate: m.pm_last_date,
        note: m.pm_note || ''
      }
    }));

    // โหลดประวัติการซ่อม
    const { data: repairs, error: repairsError } = await supabase
      .from('repairs')
      .select('*')
      .order('repair_date', { ascending: false });
    
    if (repairsError) throw repairsError;
    DB.repairs = repairs.map(r => ({
      id: r.id,
      machineId: r.machine_id,
      date: r.repair_date,
      type: r.repair_type,
      tech: r.technician,
      symptom: r.symptom,
      fix: r.fix || '-',
      parts: r.parts || '',
      status: r.status || 'done',
      files: r.files || []
    }));

  } catch (error) {
    console.error('Error loading data:', error);
    showToast('เกิดข้อผิดพลาดในการโหลดข้อมูล');
  }
  
  isLoading = false;
  render();
}

async function saveRepairToDb(repair) {
  const { data, error } = await supabase
    .from('repairs')
    .insert({
      machine_id: repair.machineId,
      repair_date: repair.date,
      repair_type: repair.type,
      technician: repair.tech,
      symptom: repair.symptom,
      fix: repair.fix,
      parts: repair.parts,
      status: repair.status,
      files: repair.files
    })
    .select()
    .single();
  
  if (error) throw error;
  return data;
}

async function updateMachinePmDate(machineId, date) {
  const { error } = await supabase
    .from('machines')
    .update({ pm_last_date: date })
    .eq('id', machineId);
  
  if (error) throw error;
}

async function updateMachinePmSettings(machineId, intervalDays, lastDate, note) {
  const { error } = await supabase
    .from('machines')
    .update({
      pm_interval_days: intervalDays,
      pm_last_date: lastDate,
      pm_note: note
    })
    .eq('id', machineId);
  
  if (error) throw error;
}

async function uploadFile(file, machineId) {
  const fileExt = file.name.split('.').pop();
  const fileName = `${machineId}/${Date.now()}.${fileExt}`;
  
  const { data, error } = await supabase.storage
    .from('repair-files')
    .upload(fileName, file);
  
  if (error) throw error;
  
  const { data: urlData } = supabase.storage
    .from('repair-files')
    .getPublicUrl(fileName);
  
  return urlData.publicUrl;
}

// ==================== PM UTILS ====================
function getPmStatus(m) {
  if (!m.pm || !m.pm.lastPmDate) return null;
  const last = new Date(m.pm.lastPmDate);
  const next = new Date(last);
  next.setDate(next.getDate() + m.pm.intervalDays);
  const today = new Date();
  today.setHours(0,0,0,0);
  const daysLeft = Math.ceil((next - today) / (1000*60*60*24));
  return { nextDate: next, daysLeft, overdue: daysLeft < 0, dueSoon: daysLeft >= 0 && daysLeft <= 7 };
}

function pmStatusBadge(m) {
  const s = getPmStatus(m);
  if (!s) return "";
  if (s.overdue) return `<span class="badge badge-overdue">PM เกินกำหนด ${Math.abs(s.daysLeft)} วัน</span>`;
  if (s.dueSoon) return `<span class="badge badge-due">PM อีก ${s.daysLeft} วัน</span>`;
  return `<span class="badge badge-ok">PM อีก ${s.daysLeft} วัน</span>`;
}

function getAllAlerts() {
  const alerts = [];
  DB.machines.forEach(m => {
    const s = getPmStatus(m);
    if (!s) return;
    if (s.overdue || s.dueSoon) alerts.push({ machine: m, status: s });
  });
  alerts.sort((a,b) => a.status.daysLeft - b.status.daysLeft);
  return alerts;
}

// ==================== UTILS ====================
function formatDate(d) {
  if (!d) return "-";
  const dt = new Date(d);
  return dt.toLocaleDateString("th-TH", { year: "numeric", month: "short", day: "numeric" });
}

function statusBadge(s) {
  const map = {
    ok: ["badge-ok","ปกติ"], wait: ["badge-wait","รอดำเนินการ"],
    fix: ["badge-fix","กำลังซ่อม"], done: ["badge-ok","เสร็จแล้ว"], PM: ["badge-pm","PM"]
  };
  const [cls, label] = map[s] || ["badge-pm", s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function machineStatus(m) {
  const repairs = DB.repairs.filter(r => r.machineId === m.id);
  return repairs.some(r => r.status === "wait") ? "wait" : "ok";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ==================== VIEWS ====================

function renderLoading() {
  document.getElementById("app").innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      <p style="margin-top:12px;">กำลังโหลดข้อมูล...</p>
    </div>
  `;
}

function renderList() {
  const total = DB.machines.length;
  const currentMonth = new Date().toISOString().slice(0, 7);
  const thisMonth = DB.repairs.filter(r => r.date && r.date.startsWith(currentMonth)).length;
  const pendingRepair = DB.repairs.filter(r => r.status === "wait").length;
  const alerts = getAllAlerts();
  const alertCount = alerts.length;

  return `
    <div class="header">
      <div>
        <div class="header-title">ระบบจัดการ</div>
        <h1>ประวัติการซ่อมเครื่องจักร</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-sm" onclick="navigate('notifications',null)" style="position:relative;">
          🔔 แจ้งเตือน
          ${alertCount > 0 ? `<span style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${alertCount}</span>` : ""}
        </button>
        <button class="btn btn-primary btn-sm" onclick="navigate('add',null)">+ บันทึกการซ่อม</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">เครื่องจักร</div>
        <div class="stat-val">${total}</div>
      </div>
      <div class="stat">
        <div class="stat-label">ซ่อมเดือนนี้</div>
        <div class="stat-val">${thisMonth}</div>
      </div>
      <div class="stat">
        <div class="stat-label" style="color:var(--warn)">รอดำเนินการ</div>
        <div class="stat-val" style="color:var(--warn)">${pendingRepair}</div>
      </div>
      <div class="stat" style="cursor:pointer;" onclick="navigate('notifications',null)">
        <div class="stat-label" style="color:${alertCount>0?'var(--danger)':'var(--text3)'}">แจ้งเตือน PM</div>
        <div class="stat-val" style="color:${alertCount>0?'var(--danger)':'var(--text)'}">${alertCount}</div>
      </div>
    </div>

    ${alertCount > 0 ? `
      <div style="margin-bottom:20px;">
        ${alerts.slice(0,3).map(a => `
          <div class="pm-alert-banner ${a.status.overdue?'overdue':'due'}" style="cursor:pointer;" onclick="navigate('machine','${a.machine.id}')">
            <div class="pm-alert-icon">${a.status.overdue ? '🚨' : '⚠️'}</div>
            <div>
              <div class="pm-alert-title">${a.status.overdue ? `PM เกินกำหนด ${Math.abs(a.status.daysLeft)} วัน` : `PM ครบกำหนดใน ${a.status.daysLeft} วัน`}</div>
              <div class="pm-alert-desc">${a.machine.name} · ${a.machine.desc} · กำหนด ${formatDate(a.status.nextDate)}</div>
            </div>
          </div>
        `).join("")}
        ${alertCount > 3 ? `<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:6px;">และอีก ${alertCount-3} รายการ — <span style="color:var(--accent);cursor:pointer;" onclick="navigate('notifications',null)">ดูทั้งหมด</span></p>` : ""}
      </div>
    ` : ""}

    ${DB.groups.map(g => {
      const gMachines = DB.machines.filter(m => m.group === g.id);
      return `<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div class="section-label" style="margin-bottom:0;">${g.name}</div>
          <div style="flex:1;height:0.5px;background:var(--border);"></div>
          <span style="font-size:11px;color:var(--text3);">${gMachines.length} เครื่อง</span>
        </div>
        <div class="machine-grid">
          ${gMachines.map(m => {
            const st = machineStatus(m);
            const ps = getPmStatus(m);
            const cardClass = ps ? (ps.overdue ? "pm-overdue" : ps.dueSoon ? "pm-due" : "") : "";
            return `<div class="machine-card ${cardClass}" onclick="navigate('machine','${m.id}')">
              <div class="machine-card-top"><span class="machine-icon">${m.icon}</span>${statusBadge(st)}</div>
              <div class="machine-name">${m.name}</div>
              <div class="machine-desc">${m.desc}</div>
              ${ps ? `<div style="margin-top:6px;">${pmStatusBadge(m)}</div>` : ""}
              <div class="machine-date">📍 ${m.location}</div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  `;
}

function renderNotifications() {
  const alerts = getAllAlerts();
  return `
    <div class="back-row">
      <button class="btn btn-sm" onclick="navigate('list',null)">← กลับ</button>
      <h2>การแจ้งเตือน PM</h2>
    </div>

    ${alerts.length === 0 ? `
      <div class="card" style="text-align:center;padding:40px;">
        <div style="font-size:36px;margin-bottom:12px;">✅</div>
        <p style="font-weight:600;margin-bottom:4px;">เครื่องจักรทุกตัวอยู่ในเกณฑ์ปกติ</p>
        <p style="font-size:13px;color:var(--text3);">ไม่มีเครื่องที่ต้องทำ PM ในขณะนี้</p>
      </div>
    ` : `
      <div class="card">
        ${alerts.map(a => `
          <div class="notif-item">
            <div class="notif-dot ${a.status.overdue?'red':'orange'}"></div>
            <div style="flex:1;">
              <div class="notif-title">${a.machine.name}</div>
              <div class="notif-desc">
                ${a.status.overdue

            </div>

    <div style="margin-top:16px;">
      <p class="section-label">เครื่องจักรทั้งหมด</p>
      <div class="card">
        ${DB.machines.map(m => {
          const ps = getPmStatus(m);
          return `<div class="pm-row">
            <div>
              <div style="font-size:13px;font-weight:600;">${m.name}</div>
              <div style="font-size:11px;color:var(--text3);">รอบ: ทุก ${m.pm.intervalDays} วัน · ทำล่าสุด: ${formatDate(m.pm.lastPmDate)}</div>

            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

      </div>
