<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกประวัติเครื่องจักร & PM (ใช้งานจริง)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-gears text-2xl"></i>
                <span class="font-bold text-xl">MachineCare Online</span>
            </div>
            <div class="text-sm bg-blue-700 px-3 py-1 rounded-full" id="db-status">
                กำลังเชื่อมต่อฐานข้อมูล...
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center">
                        <i class="fa-solid fa-industry text-blue-500 mr-2"></i> ทะเบียนเครื่องจักร (ข้อมูลจริง)
                    </h2>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                <th class="p-3">รหัส / ชื่อ</th>
                                <th class="p-3">ยี่ห้อ/รุ่น</th>
                                <th class="p-3">สถานะ</th>
                                <th class="p-3">รอบ PM ถัดไป</th>
                            </tr>
                        </thead>
                        <tbody id="machine-list" class="text-sm text-gray-700 divide-y">
                            <tr>
                                <td colspan="4" class="p-4 text-center text-gray-500">กำลังโหลดข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa-solid fa-plus text-green-500 mr-2"></i> เพิ่มเครื่องจักรใหม่ เข้าคลัง
                </h2>
                <form id="add-machine-form" class="space-y-4 text-sm">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">รหัสเครื่องจักร</label>
                        <input type="text" id="m_code" class="w-full p-2 border rounded-lg bg-gray-50" placeholder="เช่น MC-001" required>
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">ชื่อเครื่องจักร</label>
                        <input type="text" id="m_name" class="w-full p-2 border rounded-lg bg-gray-50" placeholder="เช่น เครื่องปั๊ม" required>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-600 font-medium mb-1">ยี่ห้อ</label>
                            <input type="text" id="m_brand" class="w-full p-2 border rounded-lg bg-gray-50" placeholder="เช่น Mitsubishi">
                        </div>
                        <div>
                            <label class="block text-gray-600 font-medium mb-1">รุ่น</label>
                            <input type="text" id="m_model" class="w-full p-2 border rounded-lg bg-gray-50" placeholder="เช่น X-2026">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">วัน PM รอบถัดไป</label>
                        <input type="date" id="m_next_pm" class="w-full p-2 border rounded-lg bg-gray-50" required>
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold p-2.5 rounded-lg transition shadow-md">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกลงฐานข้อมูลข้อมูลจริง
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ แทนที่ข้อมูลตรงนี้ด้วย URL และ Anon Key ที่ได้มาจากโปรเจกต์ Supabase ของคุณ
        const SUPABASE_URL = "https://xypzufiofqpvsjinhldv.supabase.co"; 
        const SUPABASE_KEY = "GU7Z7a8xDxHUN2Oi";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ฟังก์ชันดึงข้อมูลจากฐานข้อมูลมาแสดงบนตาราง
        async function fetchMachines() {
            document.getElementById('db-status').innerText = "กำลังดึงข้อมูล...";
            
            // ดึงข้อมูลทั้งหมดจากตารางชื่อ machines
            let { data: machines, error } = await supabase.from('machines').select('*');
            
            if (error) {
                console.error(error);
                document.getElementById('db-status').innerText = "🔴 เชื่อมต่อผิดพลาด";
                return;
            }

            document.getElementById('db-status').innerText = "🟢 เชื่อมต่อฐานข้อมูลออนไลน์แล้ว";
            const tableBody = document.getElementById('machine-list');
            tableBody.innerHTML = ""; // ล้างข้อมูลเก่าออกก่อน

            if(machines.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">ไม่มีข้อมูลเครื่องจักรในระบบ</td></tr>`;
                return;
            }

            // วนลูปเอาข้อมูลแต่ละแถวมาสร้างเป็นตาราง HTML
            machines.forEach(machine => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50";
                row.innerHTML = `
                    <td class="p-3">
                        <div class="font-semibold text-blue-600">${machine.machine_code}</div>
                        <div class="text-xs text-gray-500">${machine.name}</div>
                    </td>
                    <td class="p-3">${machine.brand || '-'} / ${machine.model || '-'}</td>
                    <td class="p-3"><span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full font-medium">${machine.status || 'พร้อมใช้งาน'}</span></td>
                    <td class="p-3 font-medium text-gray-700">${machine.next_pm_date}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // ระบบบันทึกข้อมูลเมื่อกดส่งฟอร์ม (Form Submission)
        document.getElementById('add-machine-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีโหลดตัวเอง
            
            const newMachine = {
                machine_code: document.getElementById('m_code').value,
                name: document.getElementById('m_name').value,
                brand: document.getElementById('m_brand').value,
                model: document.getElementById('m_model').value,
                status: "พร้อมใช้งาน",
                next_pm_date: document.getElementById('m_next_pm').value
            };

            // ส่งข้อมูลไปบันทึกที่ตาราง machines บน Supabase
            const { error } = await supabase.from('machines').insert([newMachine]);

            if (error) {
                alert("เกิดข้อผิดพลาดในการบันทึก: " + error.message);
            } else {
                alert("บันทึกเครื่องจักรใหม่เรียบร้อยแล้ว!");
                document.getElementById('add-machine-form').reset(); // ล้างฟอร์ม
                fetchMachines(); // โหลดตารางใหม่เพื่อแสดงข้อมูลล่าสุด
            }
        });

        // สั่งให้โหลดข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        fetchMachines();
    </script>
</body>
</html>
